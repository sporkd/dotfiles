# Antidote
[".antidote"]
  type = "git-repo"
  url = "https://github.com/mattmc3/antidote.git"
  refreshPeriod = "168h"
  clone = { args = ["--depth=1"] }

# Zsh
[".config/zsh/site-functions/_chezmoi"]
    type = "file"
    url = "https://raw.githubusercontent.com/twpayne/chezmoi/master/completions/chezmoi.zsh"
    refreshPeriod = "168h"

# Fish
[".config/fish/completions/chezmoi.fish"]
    type = "file"
    url = "https://raw.githubusercontent.com/twpayne/chezmoi/master/completions/chezmoi.fish"
    refreshPeriod = "168h"

[".config/fish/functions/fisher.fish"]
    type = "file"
    url = "https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish"
    refreshPeriod = "168h"

[".config/fish/completions/fisher.fish"]
    type = "file"
    url = "https://raw.githubusercontent.com/jorgebucaran/fisher/main/completions/fisher.fish"
    refreshPeriod = "168h"
