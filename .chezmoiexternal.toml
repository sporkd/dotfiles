# Antidote
[".antidote"]
  type = "git-repo"
  url = "https://github.com/mattmc3/antidote.git"
  refreshPeriod = "168h"
  clone = { args = ["--depth=1"] }

# Zsh
[".local/share/zsh/site-functions/_chezmoi"]
  type = "file"
  url = "https://raw.githubusercontent.com/twpayne/chezmoi/master/completions/chezmoi.zsh"
  refreshPeriod = "168h"

[".local/share/zsh/site-functions/_mise"]
  type = "file"
  url = "https://raw.githubusercontent.com/jdx/mise/main/completions/_mise"
  refreshPeriod = "168h"

